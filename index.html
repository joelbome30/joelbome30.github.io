<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="El universo 3D de Joel: programación, videojuegos, Linux y experimentos digitales." />
  <meta name="theme-color" content="#02030a" />
  <title>Joel — Universo 3D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.174.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.174.0/examples/jsm/"
      }
    }
  </script>
</head>
<body data-theme="dark" data-page="home">
  <div class="boot" id="boot" aria-live="polite">
    <div class="boot__cell" aria-hidden="true"><i></i><i></i><i></i><span>J</span></div>
    <p>INCUBANDO UNIVERSO</p>
    <div class="boot__progress"><i></i></div>
  </div>

  <canvas id="universe" aria-label="Menú tridimensional del universo de Joel"></canvas>
  <div class="atmosphere" aria-hidden="true"></div>
  <div class="film-grain" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>
  <div class="page-wipe" aria-hidden="true"></div>

  <div class="world-labels" id="worldLabels">
    <a class="world-label world-label--menu" data-anchor="menu-skills" data-action="paginas/habilidades.html" href="paginas/habilidades.html">
      <span>01</span><strong>HABILIDADES</strong><small>ENTRAR</small>
    </a>
    <a class="world-label world-label--menu" data-anchor="menu-projects" data-action="paginas/proyectos.html" href="paginas/proyectos.html">
      <span>02</span><strong>PROYECTOS</strong><small>ENTRAR</small>
    </a>
    <a class="world-label world-label--menu" data-anchor="menu-github" data-action="paginas/github.html" href="paginas/github.html">
      <span>03</span><strong>GITHUB</strong><small>ENTRAR</small>
    </a>
  </div>

  <main class="single-page">
    <section class="chapter chapter--hero is-active">
      <div class="copy copy--hero">
        <p class="eyebrow">DESARROLLADOR</p>
        <h1><span>Hola, Soy</span> JOEL</h1>
        <p class="intro">Tengo 14 años y llevo dos años aprendiendo programación. Me gusta experimentar con JavaScript, Python, videojuegos, Linux cualquier cosa de tecnologia.</p>
        <p class="instruction"><i></i> MUEVE EL CURSOR</p>
      </div>
    </section>
  </main>

  <div class="cursor" id="cursor" aria-hidden="true"><i></i></div>
  <noscript>Esta experiencia necesita JavaScript para generar su universo 3D.</noscript>
  <script>window.setTimeout(() => document.getElementById("boot")?.classList.add("is-finished"), 5000);</script>
  <script type="module" src="script.js"></script>
</body>
</html>
